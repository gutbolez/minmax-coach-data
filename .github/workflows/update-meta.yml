name: Update meta.json

# Auto-refresh the build/rune/summoner meta by scraping lolalytics with a
# headless browser. Runs daily and on demand. The app fetches the committed
# meta.json, so a refresh reaches every user on their next launch with no new
# installer.
on:
  schedule:
    - cron: "17 9 * * *" # daily, 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Remember the patch BEFORE the scrape overwrites meta.json, so we can tell
      # a real patch bump from a routine daily refresh.
      - name: Capture current patch
        run: echo "OLD_PATCH=$(jq -r '.patch // empty' meta.json)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Build meta.json
        run: node scripts/ingest.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain meta.json)" ]; then
            git config user.name "meta-bot"
            git config user.email "actions@github.com"
            git add meta.json
            git commit -m "Update meta.json ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No change."
          fi

      # Ping Discord ONLY when the patch number actually changed (not the daily
      # no-op refresh). Uses the same DISCORD_WEBHOOK secret as the release
      # announcer; inert until that secret is added to THIS repo.
      - name: Announce patch change on Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          NEW_PATCH=$(jq -r '.patch // empty' meta.json)
          if [ -z "$WEBHOOK" ]; then echo "No DISCORD_WEBHOOK secret — skipping."; exit 0; fi
          if [ -z "$NEW_PATCH" ] || [ "$NEW_PATCH" = "$OLD_PATCH" ]; then
            echo "Patch unchanged ($OLD_PATCH -> $NEW_PATCH) — no ping."
            exit 0
          fi
          echo "Patch changed: $OLD_PATCH -> $NEW_PATCH"
          payload=$(jq -n --arg content "📊 **Builds are updated for patch $NEW_PATCH.** Min-Max Coach already has the new meta — no update needed, it pulls it automatically." '{content:$content}')
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$WEBHOOK"
