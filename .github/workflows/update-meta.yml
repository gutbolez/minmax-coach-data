name: Update meta.json

# Auto-refresh the build/rune/summoner meta by scraping lolalytics with a
# headless browser. Runs daily and on demand. The app fetches the committed
# meta.json, so a refresh reaches every user on their next launch with no new
# installer.
on:
  schedule:
    - cron: "17 9 * * *" # daily, 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Build meta.json
        run: node scripts/ingest.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain meta.json)" ]; then
            git config user.name "meta-bot"
            git config user.email "actions@github.com"
            git add meta.json
            git commit -m "Update meta.json ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No change."
          fi
